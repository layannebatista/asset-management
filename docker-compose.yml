services:
  postgres:
    image: postgres:16
    container_name: asset-management-db
    environment:
      POSTGRES_DB: asset_management
      POSTGRES_USER: asset_user
      POSTGRES_PASSWORD: asset123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asset_user -d asset_management"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
  asset-management:
    build: ./backend
    container_name: asset-management-api
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres:5432/asset_management?currentSchema=public
      DB_USERNAME: asset_user
      DB_PASSWORD: asset123
      JWT_SECRET: asset-management-super-secret-key-1234567890
      MAIL_USERNAME: test
      MAIL_PASSWORD: test
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    restart: unless-stopped
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: asset-management-frontend
    ports:
      - "5173:5173"
    depends_on:
      - asset-management
    environment:
      VITE_API_URL: http://localhost:8080
    volumes:
      - ./frontend/src:/app/src
    restart: unless-stopped
volumes:
  postgres_data: