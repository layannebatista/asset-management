networks:
  asset-net:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  influxdb_data:

x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ─── Banco de dados ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: asset-management-db
    environment:
      POSTGRES_DB: asset_management
      POSTGRES_USER: ${DB_USERNAME:-asset_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-asset123}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-asset_user} -d asset_management"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    cpus: "0.50"
    mem_limit: 512m
    logging: *default-logging
    networks:
      - asset-net
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

  # ─── Backend Spring Boot ───────────────────────────────────────────────────
  asset-management:
    build: ./backend
    container_name: asset-management-api
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      # DB_URL aponta para o service interno; sobrescreve o valor localhost do .env
      DB_URL: jdbc:postgresql://postgres:5432/asset_management?currentSchema=public
      DB_USERNAME: ${DB_USERNAME:-asset_user}
      DB_PASSWORD: ${DB_PASSWORD:-asset123}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      TEST_DATA_CLEANUP_ENABLED: ${TEST_DATA_CLEANUP_ENABLED:-true}
      TEST_DATA_CLEANUP_KEY: ${TEST_DATA_CLEANUP_KEY:-cleanup-local-key}

    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped
    cpus: "1.00"
    mem_limit: 768m
    logging: *default-logging
    networks:
      - asset-net
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 768M

  # ─── Frontend React (build estático via Nginx) ────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # /api → Nginx proxy reverso encaminha para http://asset-management:8080
        # Funciona no Docker E2E (browser resolve pela mesma origem) e via localhost:5173
        # Para dev local sem Docker, use: npm run dev (usa VITE_API_URL do .env diretamente)
        VITE_API_URL: /api
    container_name: asset-management-frontend
    ports:
      - "5173:80"
    depends_on:
      - asset-management
    restart: unless-stopped
    cpus: "0.25"
    mem_limit: 128m
    logging: *default-logging
    networks:
      - asset-net
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  # ─── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    profiles: ["observability"]
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      asset-management:
        condition: service_healthy
    restart: unless-stopped
    cpus: "0.30"
    mem_limit: 256m
    logging: *default-logging
    networks:
      - asset-net

  # ─── InfluxDB — banco de séries temporais para métricas do k6 ─────────────
  # k6 envia métricas em tempo real — execute o comando abaixo do host:
  #   k6 run --out influxdb=http://localhost:8086/k6 k6/test.js
  # Para sobrescrever URL ou credenciais:
  #   BASE_URL=http://localhost:8080 ADMIN_EMAIL=admin@empresa.com ADMIN_PASSWORD=Admin@123 \
  #     k6 run --out influxdb=http://localhost:8086/k6 k6/test.js
  # Acesse os dados via Grafana (datasource InfluxDB já provisionado)
  influxdb:
    image: influxdb:1.8-alpine
    container_name: influxdb
    profiles: ["observability"]
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB: k6
      INFLUXDB_HTTP_AUTH_ENABLED: "false"
    volumes:
      - influxdb_data:/var/lib/influxdb
    healthcheck:
      test: ["CMD", "influx", "-execute", "SHOW DATABASES"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    cpus: "0.30"
    mem_limit: 256m
    logging: *default-logging
    networks:
      - asset-net

  # ─── Grafana ───────────────────────────────────────────────────────────────
  # Painéis disponíveis:
  #   • Spring Boot / JVM (métricas da API via Prometheus)
  #   • k6 Load Testing (métricas de performance via InfluxDB)
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    profiles: ["observability"]
    # Porta 3001 para evitar conflito com servidores de dev locais na 3000
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_DOMAIN: localhost
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      - prometheus
      - influxdb
    restart: unless-stopped
    cpus: "0.30"
    mem_limit: 256m
    logging: *default-logging
    networks:
      - asset-net

  # ─── Allure — Projeto Backend (BDD Spring Boot) ───────────────────────────
  # Lê os resultados gerados por: mvn test (dentro de backend/)
  # Acesse o relatório em: http://localhost:5050
  #
  # A separação Backend / Frontend no painel é feita pelas labels:
  #   @allure.label.parentSuite:Backend  → nos testes Java (feature files)
  #   @allure.label.parentSuite:Frontend → nos testes Playwright (feature files)
  # Na aba "Suites" do Allure ambos aparecem como grupos separados dentro do mesmo projeto.
  allure:
    image: frankescobar/allure-docker-service:latest
    container_name: allure
    profiles: ["reports"]
    ports:
      - "5050:5050"
    environment:
      CHECK_RESULTS_EVERY_SECONDS: "3"
      KEEP_HISTORY: "1"
      KEEP_HISTORY_LATEST: "20"
      MAKE_VIEWER_ENDPOINTS_PUBLIC: "true"
      SECURITY_ENABLED: "false"
    volumes:
      - ./allure-results:/app/allure-results
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5050/allure-docker-service/version"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped
    cpus: "0.20"
    mem_limit: 192m
    logging: *default-logging
    networks:
      - asset-net

  # ─── Allure UI (interface web) ─────────────────────────────────────────────
  # Acesse em http://localhost:5252
  allure-ui:
    image: frankescobar/allure-docker-service-ui:latest
    container_name: allure-ui
    profiles: ["reports"]
    ports:
      - "5252:5252"
    environment:
      ALLURE_DOCKER_PUBLIC_API_URL: "http://localhost:5050"
      ALLURE_DOCKER_PUBLIC_API_URL_PREFIX: ""
    depends_on:
      - allure
    restart: unless-stopped
    cpus: "0.10"
    mem_limit: 96m
    logging: *default-logging
    networks:
      - asset-net

  # ─── Reset dos dados E2E no banco ────────────────────────────────────────────
  # Restaura os assets de seed (E2E-AVAIL-*) para AVAILABLE antes de cada
  # execução de testes, garantindo que os cenários sempre encontrem dados frescos.
  reset-e2e-data:
    image: postgres:16-alpine
    container_name: reset-e2e-data
    profiles: ["tests"]
    environment:
      PGPASSWORD: ${DB_PASSWORD:-asset123}
    command: >
      psql -h postgres -U ${DB_USERNAME:-asset_user} -d asset_management -c "
        -- Limpar relações sem deletar os ativos (para não quebrar os testes)
        DELETE FROM asset_insurance
        WHERE asset_id IN (
          SELECT id FROM assets
          WHERE asset_tag LIKE 'E2E-%'
        );
        DELETE FROM maintenance_records
        WHERE asset_id IN (
          SELECT id FROM assets
          WHERE asset_tag LIKE 'E2E-%'
        );
        DELETE FROM transfer_requests
        WHERE asset_id IN (
          SELECT id FROM assets
          WHERE asset_tag LIKE 'E2E-%'
        );
        DELETE FROM asset_assignment_history
        WHERE asset_id IN (
          SELECT id FROM assets
          WHERE asset_tag LIKE 'E2E-%'
        );
        DELETE FROM asset_status_history
        WHERE asset_id IN (
          SELECT id FROM assets
          WHERE asset_tag LIKE 'E2E-%'
        );
        -- Resetar ativos E2E para status AVAILABLE e sem usuário atribuído
        UPDATE assets
        SET status = 'AVAILABLE', user_id = NULL
        WHERE asset_tag LIKE 'E2E-%';

        -- Garantir que os ativos E2E foram criados (fallback para seeds não executadas)
        INSERT INTO public.assets (asset_tag, type, model, status, organization_id, unit_id, user_id, version)
        SELECT 'E2E-AVAIL-001', 'NOTEBOOK', 'Dell Latitude E2E 01', 'AVAILABLE', o.id, u.id, NULL, 0
        FROM public.organizations o JOIN public.units u ON u.organization_id = o.id AND u.name = 'Matriz SP'
        WHERE o.name = 'Empresa Demo Ltda' ON CONFLICT (asset_tag) DO NOTHING;

        INSERT INTO public.assets (asset_tag, type, model, status, organization_id, unit_id, user_id, version)
        SELECT 'E2E-AVAIL-002', 'DESKTOP', 'HP EliteDesk E2E 02', 'AVAILABLE', o.id, u.id, NULL, 0
        FROM public.organizations o JOIN public.units u ON u.organization_id = o.id AND u.name = 'Matriz SP'
        WHERE o.name = 'Empresa Demo Ltda' ON CONFLICT (asset_tag) DO NOTHING;

        INSERT INTO public.assets (asset_tag, type, model, status, organization_id, unit_id, user_id, version)
        SELECT 'E2E-AVAIL-003', 'TABLET', 'iPad Air E2E 03', 'AVAILABLE', o.id, u.id, NULL, 0
        FROM public.organizations o JOIN public.units u ON u.organization_id = o.id AND u.name = 'Matriz SP'
        WHERE o.name = 'Empresa Demo Ltda' ON CONFLICT (asset_tag) DO NOTHING;

        INSERT INTO public.assets (asset_tag, type, model, status, organization_id, unit_id, user_id, version)
        SELECT 'E2E-AVAIL-004', 'NOTEBOOK', 'Lenovo ThinkPad E2E 04', 'AVAILABLE', o.id, u.id, NULL, 0
        FROM public.organizations o JOIN public.units u ON u.organization_id = o.id AND u.name = 'Filial RJ'
        WHERE o.name = 'Empresa Demo Ltda' ON CONFLICT (asset_tag) DO NOTHING;

        INSERT INTO public.assets (asset_tag, type, model, status, organization_id, unit_id, user_id, version)
        SELECT 'E2E-AVAIL-005', 'DESKTOP', 'Dell OptiPlex E2E 05', 'AVAILABLE', o.id, u.id, NULL, 0
        FROM public.organizations o JOIN public.units u ON u.organization_id = o.id AND u.name = 'Filial RJ'
        WHERE o.name = 'Empresa Demo Ltda' ON CONFLICT (asset_tag) DO NOTHING;

        INSERT INTO public.assets (asset_tag, type, model, status, organization_id, unit_id, user_id, version)
        SELECT 'E2E-AVAIL-006', 'MOBILE_PHONE', 'iPhone 14 E2E 06', 'AVAILABLE', o.id, u.id, NULL, 0
        FROM public.organizations o JOIN public.units u ON u.organization_id = o.id AND u.name = 'Filial RJ'
        WHERE o.name = 'Empresa Demo Ltda' ON CONFLICT (asset_tag) DO NOTHING;

        INSERT INTO public.assets (asset_tag, type, model, status, organization_id, unit_id, user_id, version)
        SELECT 'E2E-AVAIL-007', 'NOTEBOOK', 'Acer Aspire E2E 07', 'AVAILABLE', o.id, u.id, NULL, 0
        FROM public.organizations o JOIN public.units u ON u.organization_id = o.id AND u.name = 'Filial BH'
        WHERE o.name = 'Empresa Demo Ltda' ON CONFLICT (asset_tag) DO NOTHING;

        INSERT INTO public.assets (asset_tag, type, model, status, organization_id, unit_id, user_id, version)
        SELECT 'E2E-AVAIL-008', 'TABLET', 'Samsung Tab S8 E2E 08', 'AVAILABLE', o.id, u.id, NULL, 0
        FROM public.organizations o JOIN public.units u ON u.organization_id = o.id AND u.name = 'Filial BH'
        WHERE o.name = 'Empresa Demo Ltda' ON CONFLICT (asset_tag) DO NOTHING;

        INSERT INTO public.assets (asset_tag, type, model, status, organization_id, unit_id, user_id, version)
        SELECT 'E2E-AVAIL-009', 'DESKTOP', 'Positivo Master E2E 09', 'AVAILABLE', o.id, u.id, NULL, 0
        FROM public.organizations o JOIN public.units u ON u.organization_id = o.id AND u.name = 'Filial BH'
        WHERE o.name = 'Empresa Demo Ltda' ON CONFLICT (asset_tag) DO NOTHING;

        INSERT INTO public.assets (asset_tag, type, model, status, organization_id, unit_id, user_id, version)
        SELECT 'E2E-AVAIL-010', 'NOTEBOOK', 'Asus ZenBook E2E 10', 'AVAILABLE', o.id, u.id, NULL, 0
        FROM public.organizations o JOIN public.units u ON u.organization_id = o.id AND u.name = 'Matriz SP'
        WHERE o.name = 'Empresa Demo Ltda' ON CONFLICT (asset_tag) DO NOTHING;

        INSERT INTO public.assets (asset_tag, type, model, status, organization_id, unit_id, user_id, version)
        SELECT 'E2E-ASSIGN-001', 'NOTEBOOK', 'Dell XPS E2E Assign 01', 'ASSIGNED', o.id, u.id, usr.id, 0
        FROM public.organizations o
        JOIN public.units u ON u.organization_id = o.id AND u.name = 'Matriz SP'
        JOIN public.users usr ON usr.email = 'admin@empresa.com'
        WHERE o.name = 'Empresa Demo Ltda' ON CONFLICT (asset_tag) DO NOTHING;

        INSERT INTO public.assets (asset_tag, type, model, status, organization_id, unit_id, user_id, version)
        SELECT 'E2E-ASSIGN-002', 'MOBILE_PHONE', 'Samsung S22 E2E Assign 02', 'ASSIGNED', o.id, u.id, usr.id, 0
        FROM public.organizations o
        JOIN public.units u ON u.organization_id = o.id AND u.name = 'Filial RJ'
        JOIN public.users usr ON usr.email = 'gestor@empresa.com'
        WHERE o.name = 'Empresa Demo Ltda' ON CONFLICT (asset_tag) DO NOTHING;

        INSERT INTO public.assets (asset_tag, type, model, status, organization_id, unit_id, user_id, version)
        SELECT 'E2E-ASSIGN-003', 'TABLET', 'iPad Mini E2E Assign 03', 'ASSIGNED', o.id, u.id, usr.id, 0
        FROM public.organizations o
        JOIN public.units u ON u.organization_id = o.id AND u.name = 'Filial BH'
        JOIN public.users usr ON usr.email = 'operador@empresa.com'
        WHERE o.name = 'Empresa Demo Ltda' ON CONFLICT (asset_tag) DO NOTHING;

        INSERT INTO public.assets (asset_tag, type, model, status, organization_id, unit_id, user_id, version)
        SELECT 'E2E-ASSIGN-004', 'DESKTOP', 'HP ProDesk E2E Assign 04', 'ASSIGNED', o.id, u.id, usr.id, 0
        FROM public.organizations o
        JOIN public.units u ON u.organization_id = o.id AND u.name = 'Matriz SP'
        JOIN public.users usr ON usr.email = 'admin@empresa.com'
        WHERE o.name = 'Empresa Demo Ltda' ON CONFLICT (asset_tag) DO NOTHING;

        INSERT INTO public.assets (asset_tag, type, model, status, organization_id, unit_id, user_id, version)
        SELECT 'E2E-ASSIGN-005', 'NOTEBOOK', 'MacBook Pro E2E Assign 05', 'ASSIGNED', o.id, u.id, usr.id, 0
        FROM public.organizations o
        JOIN public.units u ON u.organization_id = o.id AND u.name = 'Filial RJ'
        JOIN public.users usr ON usr.email = 'gestor@empresa.com'
        WHERE o.name = 'Empresa Demo Ltda' ON CONFLICT (asset_tag) DO NOTHING;
