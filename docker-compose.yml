networks:
  asset-net:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  influxdb_data:
  ai_intelligence_node_modules:

services:

  # ─── Banco de dados ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: asset-management-db
    environment:
      POSTGRES_DB: asset_management
      POSTGRES_USER: ${DB_USERNAME:-asset_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-asset123}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-asset_user} -d asset_management"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - asset-net
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

  # ─── Backend Spring Boot ───────────────────────────────────────────────────
  asset-management:
    build: ./backend
    container_name: asset-management-api
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      # DB_URL aponta para o service interno; sobrescreve o valor localhost do .env
      DB_URL: jdbc:postgresql://postgres:5432/asset_management?currentSchema=public
      DB_USERNAME: ${DB_USERNAME:-asset_user}
      DB_PASSWORD: ${DB_PASSWORD:-asset123}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      TEST_DATA_CLEANUP_ENABLED: ${TEST_DATA_CLEANUP_ENABLED:-true}
      TEST_DATA_CLEANUP_KEY: ${TEST_DATA_CLEANUP_KEY:-cleanup-local-key}

    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped
    networks:
      - asset-net
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 768M

  # ─── Frontend React (build estático via Nginx) ────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # /api → Nginx proxy reverso encaminha para http://asset-management:8080
        # Funciona no Docker E2E (browser resolve pela mesma origem) e via localhost:5173
        # Para dev local sem Docker, use: npm run dev (usa VITE_API_URL do .env diretamente)
        VITE_API_URL: /api
    container_name: asset-management-frontend
    ports:
      - "5173:80"
    depends_on:
      - asset-management
    restart: unless-stopped
    networks:
      - asset-net
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  # ─── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      asset-management:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - asset-net

  # ─── InfluxDB — banco de séries temporais para métricas do k6 ─────────────
  # k6 envia métricas em tempo real — execute o comando abaixo do host:
  #   k6 run --out influxdb=http://localhost:8086/k6 k6/test.js
  # Para sobrescrever URL ou credenciais:
  #   BASE_URL=http://localhost:8080 ADMIN_EMAIL=admin@empresa.com ADMIN_PASSWORD=Admin@123 \
  #     k6 run --out influxdb=http://localhost:8086/k6 k6/test.js
  # Acesse os dados via Grafana (datasource InfluxDB já provisionado)
  influxdb:
    image: influxdb:1.8-alpine
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB: k6
      INFLUXDB_HTTP_AUTH_ENABLED: "false"
    volumes:
      - influxdb_data:/var/lib/influxdb
    healthcheck:
      test: ["CMD", "influx", "-execute", "SHOW DATABASES"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - asset-net

  # ─── Grafana ───────────────────────────────────────────────────────────────
  # Painéis disponíveis:
  #   • Spring Boot / JVM (métricas da API via Prometheus)
  #   • k6 Load Testing (métricas de performance via InfluxDB)
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    # Porta 3001 para evitar conflito com servidores de dev locais na 3000
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_DOMAIN: localhost
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      - prometheus
      - influxdb
    restart: unless-stopped
    networks:
      - asset-net

  # ─── Allure — Projeto Backend (BDD Spring Boot) ───────────────────────────
  # Lê os resultados gerados por: mvn test (dentro de backend/)
  # Acesse o relatório em: http://localhost:5050
  #
  # A separação Backend / Frontend no painel é feita pelas labels:
  #   @allure.label.parentSuite:Backend  → nos testes Java (feature files)
  #   @allure.label.parentSuite:Frontend → nos testes Playwright (feature files)
  # Na aba "Suites" do Allure ambos aparecem como grupos separados dentro do mesmo projeto.
  allure:
    image: frankescobar/allure-docker-service:latest
    container_name: allure
    ports:
      - "5050:5050"
    environment:
      CHECK_RESULTS_EVERY_SECONDS: "3"
      KEEP_HISTORY: "1"
      KEEP_HISTORY_LATEST: "20"
      MAKE_VIEWER_ENDPOINTS_PUBLIC: "true"
      SECURITY_ENABLED: "false"
    volumes:
      - ./allure-results:/app/allure-results
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5050/allure-docker-service/version"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped
    networks:
      - asset-net

  # ─── Allure UI (interface web) ─────────────────────────────────────────────
  # Acesse em http://localhost:5252
  allure-ui:
    image: frankescobar/allure-docker-service-ui:latest
    container_name: allure-ui
    ports:
      - "5252:5252"
    environment:
      ALLURE_DOCKER_PUBLIC_API_URL: "http://localhost:5050"
      ALLURE_DOCKER_PUBLIC_API_URL_PREFIX: ""
    depends_on:
      - allure
    restart: unless-stopped
    networks:
      - asset-net

  # ─── Reset dos dados E2E no banco ────────────────────────────────────────────
  # Restaura os assets de seed (E2E-AVAIL-*) para AVAILABLE antes de cada
  # execução de testes, garantindo que os cenários sempre encontrem dados frescos.
  reset-e2e-data:
    image: postgres:16-alpine
    container_name: reset-e2e-data
    environment:
      PGPASSWORD: ${DB_PASSWORD:-asset123}
    command: >
      psql -h postgres -U ${DB_USERNAME:-asset_user} -d asset_management -c "
        -- Limpar relações sem deletar os ativos (para não quebrar os testes)
        DELETE FROM asset_insurance
        WHERE asset_id IN (
          SELECT id FROM assets
          WHERE asset_tag LIKE 'E2E-%'
        );
        DELETE FROM maintenance_records
        WHERE asset_id IN (
          SELECT id FROM assets
          WHERE asset_tag LIKE 'E2E-%'
        );
        DELETE FROM transfer_requests
        WHERE asset_id IN (
          SELECT id FROM assets
          WHERE asset_tag LIKE 'E2E-%'
        );
        DELETE FROM asset_assignment_history
        WHERE asset_id IN (
          SELECT id FROM assets
          WHERE asset_tag LIKE 'E2E-%'
        );
        DELETE FROM asset_status_history
        WHERE asset_id IN (
          SELECT id FROM assets
          WHERE asset_tag LIKE 'E2E-%'
        );
        -- Resetar ativos E2E para status AVAILABLE e sem usuário atribuído
        UPDATE assets
        SET status = 'AVAILABLE', user_id = NULL
        WHERE asset_tag LIKE 'E2E-%';
      "
    depends_on:
      asset-management:
        condition: service_healthy
    restart: "no"
    networks:
      - asset-net

  # ─── Limpeza de resultados anteriores ────────────────────────────────────────
  # Aguarda o Allure estar healthy antes de limpar, garantindo que o serviço
  # já está de pé quando os resultados novos chegarem.
  clean-allure-results:
    image: alpine:3.19
    container_name: clean-allure-results
    volumes:
      - ./allure-results:/allure-results
      - ./frontend/src/automation/playwright/reports:/playwright-reports
    command: >
      sh -c "find /allure-results -maxdepth 1 -type f -delete &&
             rm -rf /allure-results/history &&
             find /playwright-reports -maxdepth 1 -type f -name '*.json' -delete &&
             find /playwright-reports -maxdepth 1 -type f -name '*.html' -delete &&
             wget -q -O - 'http://allure:5050/allure-docker-service/clean-history?project_id=default' &&
             echo 'Resultados, histórico e relatórios anteriores removidos.'"
    depends_on:
      allure:
        condition: service_healthy
    restart: "no"
    networks:
      - asset-net

  # ─── Testes Backend (Maven + H2 em memória) ──────────────────────────────────
  # Usa H2 — não precisa do PostgreSQL nem da API deployada para rodar.
  # Aguarda o sistema completo (backend, frontend, allure) antes de iniciar
  # para garantir ordem e que os resultados serão processados pelo Allure.
  test-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.test
    container_name: asset-management-test-backend
    volumes:
      - ./allure-results:/allure-results
    depends_on:
      clean-allure-results:
        condition: service_completed_successfully
      asset-management:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: "no"
    networks:
      - asset-net

  # ─── Testes E2E Playwright ───────────────────────────────────────────────────
  test-playwright:
    build:
      context: ./frontend/src/automation/playwright
      dockerfile: Dockerfile
    container_name: asset-management-test-playwright
    environment:
      BASE_URL: http://frontend:80
      API_URL: http://asset-management:8080
      PWHEADLESS: "true"
      ALLURE_RESULTS_DIR: /allure-results
      TEST_DATA_CLEANUP_KEY: ${TEST_DATA_CLEANUP_KEY:-cleanup-local-key}
    command: ["npx", "cucumber-js", "features/**/*.feature"]
    volumes:
      - ./allure-results:/allure-results
      - ./frontend/src/automation/playwright/cucumber.js:/app/cucumber.js:ro
      - ./frontend/src/automation/playwright/tsconfig.json:/app/tsconfig.json:ro
      - ./frontend/src/automation/playwright/features:/app/features:ro
      - ./frontend/src/automation/playwright/step-definitions:/app/step-definitions:ro
      - ./frontend/src/automation/playwright/support:/app/support:ro
    depends_on:
      clean-allure-results:
        condition: service_completed_successfully
      reset-e2e-data:
        condition: service_completed_successfully
      frontend:
        condition: service_healthy
    restart: "no"
    networks:
      - asset-net

  # ─── AI Intelligence Service ──────────────────────────────────────────────────
  # Provides AI-powered observability, test intelligence, CI/CD, incident, and risk analysis.
  # Docs: http://localhost:3100/health
  ai-intelligence:
    build:
      context: ./ai-intelligence
      dockerfile: Dockerfile
    container_name: ai-intelligence
    env_file:
      - .env
    environment:
      NODE_ENV: production
      AI_SERVICE_PORT: 3100
      AI_SERVICE_API_KEY: ${AI_SERVICE_API_KEY:-local-ai-service-key}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-local-openai-key}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      OPENAI_FALLBACK_MODEL: ${OPENAI_FALLBACK_MODEL:-gpt-4o-mini}
      AI_DB_HOST: postgres
      AI_DB_PORT: 5432
      AI_DB_NAME: asset_management
      AI_DB_USER: ${DB_USERNAME:-asset_user}
      AI_DB_PASSWORD: ${DB_PASSWORD:-asset123}
      PROMETHEUS_URL: http://prometheus:9090
      ALLURE_URL: http://allure:5050
      BACKEND_URL: http://asset-management:8080
      GRAFANA_URL: http://grafana:3000
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_OWNER: ${GITHUB_OWNER:-}
      GITHUB_REPO: ${GITHUB_REPO:-}
    ports:
      - "3100:3100"
    depends_on:
      asset-management:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3100/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - asset-net
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

  # ─── Provisiona Datasources do Grafana ────────────────────────────────────────
  # Cria datasources Prometheus e InfluxDB via API após Grafana iniciar
  provision-grafana:
    image: curlimages/curl:latest
    container_name: provision-grafana
    volumes:
      - ./infra/grafana/provision-datasources.sh:/provision.sh:ro
    command: sh /provision.sh
    depends_on:
      grafana:
        condition: service_healthy
    restart: "no"
    networks:
      - asset-net

  # ─── Testes de Carga com k6 ──────────────────────────────────────────────────
  # Executa testes de performance e envia métricas para InfluxDB (visualiza no Grafana)
  # Dashboard disponível em: http://localhost:3001/d/k6-performance
  k6:
    image: grafana/k6:latest
    container_name: k6
    volumes:
      - ./k6/test.js:/app/test.js:ro
    environment:
      BASE_URL: ${BASE_URL:-http://asset-management:8080}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@empresa.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123}
      TEST_DATA_CLEANUP_KEY: ${TEST_DATA_CLEANUP_KEY:-cleanup-local-key}
    command: run --out influxdb=http://influxdb:8086/k6 /app/test.js
    depends_on:
      asset-management:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    restart: "no"
    networks:
      - asset-net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped
    networks:
      - asset-net
