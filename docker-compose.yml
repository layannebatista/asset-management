    depends_on:
      asset-management:
        condition: service_healthy
    restart: "no"
    cpus: "0.20"
    mem_limit: 128m
    logging: *default-logging
    networks:
      - asset-net

  # ─── Limpeza de resultados anteriores ────────────────────────────────────────
  # Aguarda o Allure estar healthy antes de limpar, garantindo que o serviço
  # já está de pé quando os resultados novos chegarem.
  clean-allure-results:
    image: alpine:3.19
    container_name: clean-allure-results
    profiles: ["tests"]
    volumes:
      - ./allure-results:/allure-results
      - ./frontend/src/automation/playwright/reports:/playwright-reports
    command: >
      sh -c "find /allure-results -mindepth 1 -maxdepth 1 -exec rm -rf {} + || true;
             find /playwright-reports -maxdepth 1 -type f -name '*.json' -delete || true;
             find /playwright-reports -maxdepth 1 -type f -name '*.html' -delete || true;
             wget -q -O - 'http://allure:5050/allure-docker-service/clean-history?project_id=default' || true;
             echo 'Resultados, histórico e relatórios anteriores removidos.'"
    depends_on:
      allure:
        condition: service_healthy
    restart: "no"
    cpus: "0.10"
    mem_limit: 64m
    logging: *default-logging
    networks:
      - asset-net

  # ─── Testes Backend (Maven + H2 em memória) ──────────────────────────────────
  # Usa H2 — não precisa do PostgreSQL nem da API deployada para rodar.
  # Aguarda o sistema completo (backend, frontend, allure) antes de iniciar
  # para garantir ordem e que os resultados serão processados pelo Allure.
  test-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.test
    container_name: asset-management-test-backend
    profiles: ["tests"]
    environment:
      SPRING_PROFILES_ACTIVE: test
    volumes:
      - ./allure-results:/allure-results
      - ./backend/src:/app/src:ro
      - ./backend/pom.xml:/app/pom.xml:ro
    depends_on:
      clean-allure-results:
        condition: service_completed_successfully
      asset-management:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: "no"
    cpus: "1.00"
    mem_limit: 1g
    logging: *default-logging
    networks:
      - asset-net

  # ─── Testes E2E Playwright ───────────────────────────────────────────────────
  test-playwright:
    build:
      context: ./frontend/src/automation/playwright
      dockerfile: Dockerfile
    container_name: asset-management-test-playwright
    profiles: ["tests"]
    environment:
      BASE_URL: http://frontend:80
      API_URL: http://asset-management:8080
      PWHEADLESS: "true"
      ALLURE_RESULTS_DIR: /allure-results
      TEST_DATA_CLEANUP_KEY: ${TEST_DATA_CLEANUP_KEY:-cleanup-local-key}
      # Otimizações de performance
      NODE_OPTIONS: "--max-old-space-size=2048 --max-http-header-size=16384"
      NODE_ENV: production
    command: ["npm", "test"]
    volumes:
      - ./allure-results:/allure-results
      - ./frontend/src/automation/playwright/cucumber.js:/app/cucumber.js:ro
      - ./frontend/src/automation/playwright/tsconfig.json:/app/tsconfig.json:ro
      - ./frontend/src/automation/playwright/features:/app/features:ro
      - ./frontend/src/automation/playwright/step-definitions:/app/step-definitions:ro
      - ./frontend/src/automation/playwright/support:/app/support:ro
    depends_on:
      clean-allure-results:
        condition: service_completed_successfully
      reset-e2e-data:
        condition: service_completed_successfully
      frontend:
        condition: service_healthy
    restart: "no"
    cpus: "2.0"
    mem_limit: 2g
    logging: *default-logging
    networks:
      - asset-net
    # ✅ Alocação de recursos para evitar SIGTERM
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g
        reservations:
          cpus: "1.5"
          memory: 1536m

  # ─── RTK Dashboard Service ────────────────────────────────────────────────────
  # Token optimization dashboard showing real business metrics (token savings, ROI).
  # Docs: http://localhost:3101
  rtk-dashboard:
    build:
      context: ./rtk-dashboard
      dockerfile: Dockerfile
    container_name: rtk-dashboard
    profiles: ["ai"]
    env_file:
      - .env
    environment:
      NODE_ENV: production
      AI_SERVICE_PORT: 3100
      AI_SERVICE_API_KEY: ${AI_SERVICE_API_KEY:-local-ai-service-key}
      LOCAL_ONLY_MODE: ${LOCAL_ONLY_MODE:-true}
      LLM_PROVIDER_ORDER: ${LLM_PROVIDER_ORDER:-localfree}
      LOCAL_LLM_ENABLED: ${LOCAL_LLM_ENABLED:-true}
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-local-rule-based-v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-local-openai-key}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      OPENAI_FALLBACK_MODEL: ${OPENAI_FALLBACK_MODEL:-gpt-4o-mini}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-5-sonnet-latest}
      ANTHROPIC_FALLBACK_MODEL: ${ANTHROPIC_FALLBACK_MODEL:-claude-3-5-haiku-latest}
      GITHUB_MODELS_TOKEN: ${GITHUB_MODELS_TOKEN:-}
      GITHUB_MODELS_BASE_URL: ${GITHUB_MODELS_BASE_URL:-https://models.inference.ai.azure.com}
      GITHUB_MODELS_MODEL: ${GITHUB_MODELS_MODEL:-gpt-4o-mini}
      GITHUB_MODELS_FALLBACK_MODEL: ${GITHUB_MODELS_FALLBACK_MODEL:-gpt-4o-mini}
      AI_DB_HOST: postgres
      AI_DB_PORT: 5432
      AI_DB_NAME: asset_management
      AI_DB_USER: ${DB_USERNAME:-asset_user}
      AI_DB_PASSWORD: ${DB_PASSWORD:-asset123}
      PROMETHEUS_URL: http://prometheus:9090
      ALLURE_URL: http://allure:5050
      BACKEND_URL: http://asset-management:8080
      GRAFANA_URL: http://grafana:3000
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_OWNER: ${GITHUB_OWNER:-}
      GITHUB_REPO: ${GITHUB_REPO:-}
    ports:
      - "3101:3100"
    depends_on:
      asset-management:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3100/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    cpus: "0.50"
    mem_limit: 512m
    logging: *default-logging
    networks:
      - asset-net
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

  # ─── Provisiona Datasources do Grafana ────────────────────────────────────────
  # Cria datasources Prometheus e InfluxDB via API após Grafana iniciar
  provision-grafana:
    image: curlimages/curl:latest
    container_name: provision-grafana
    profiles: ["tests"]
    volumes:
      - ./infra/grafana/provision-datasources.sh:/provision.sh:ro
    command: sh /provision.sh
    depends_on:
      grafana:
        condition: service_healthy
    restart: "no"
    cpus: "0.10"
    mem_limit: 64m
    logging: *default-logging
    networks:
      - asset-net

  # ─── Testes de Carga com k6 ──────────────────────────────────────────────────
  # Executa testes de performance e envia métricas para InfluxDB (visualiza no Grafana)
  # Dashboard disponível em: http://localhost:3001/d/k6-performance
  k6:
    image: grafana/k6:latest
    container_name: k6
    profiles: ["tests"]
    volumes:
      - ./k6/test.js:/app/test.js:ro
    environment:
      BASE_URL: ${BASE_URL:-http://asset-management:8080}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@empresa.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123}
      TEST_DATA_CLEANUP_KEY: ${TEST_DATA_CLEANUP_KEY:-cleanup-local-key}
    command: run --out influxdb=http://influxdb:8086/k6 /app/test.js
    depends_on:
      asset-management:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    restart: "no"
    cpus: "1.00"
    mem_limit: 1g
    logging: *default-logging
    networks:
      - asset-net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    profiles: ["observability"]
    ports:
      - "8081:8080"
    command:
      - "--housekeeping_interval=30s"
      - "--docker_only=true"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped
    cpus: "0.30"
    mem_limit: 192m
    logging: *default-logging
    networks:
      - asset-net

  # ─── Sprint Reporter – Gerador de Relatórios ────────────────────────────────
  # Agrega dados de testes, CI/CD e IA em um relatório estruturado
  # Acesse a API em: http://localhost:3200/api/reports/sprint
  # Documentação: docs/projects/sprint-reporter-pt-br.md
  sprint-reporter:
    build: ./sprint-reporter
    container_name: sprint-reporter
    profiles: ["reports"]
    ports:
      - "3200:3200"
    environment:
      NODE_ENV: production
      PORT: 3200
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: asset_management
      DB_USER: ${DB_USERNAME:-asset_user}
      DB_PASSWORD: ${DB_PASSWORD:-asset123}
      AI_SERVICE_URL: http://rtk-dashboard:3100
      AI_SERVICE_API_KEY: ${AI_SERVICE_API_KEY:-local-ai-service-key}
      ALLURE_RESULTS_PATH: /app/allure-results
      LOG_LEVEL: info
    volumes:
      - ./allure-results:/app/allure-results:ro
    depends_on:
      postgres:
        condition: service_healthy
      rtk-dashboard:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3200/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    cpus: "0.50"
    mem_limit: 256m
    logging: *default-logging
    networks:
      - asset-net
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
