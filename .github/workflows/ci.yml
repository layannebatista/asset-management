name: CI – Build, Test e Qualidade

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Build + Testes + Cobertura (Backend)
  # ─────────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend – Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Build e testes (com JaCoCo)
        working-directory: backend
        run: mvn clean verify -B --no-transfer-progress

      - name: Upload relatório JaCoCo
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/
          retention-days: 7

      - name: Upload resultados Allure
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: allure-results
          path: backend/allure-results/
          retention-days: 7

      - name: Publicar cobertura no Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/target/site/jacoco/jacoco.xml
          flags: backend
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Qualidade de Código (Backend) – executa em paralelo com o Job 1
  # ─────────────────────────────────────────────────────────────────────────────
  backend-quality:
    name: Backend – Qualidade (Spotless + PMD)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Verificar formatação (Spotless)
        working-directory: backend
        run: mvn spotless:check -B --no-transfer-progress

      - name: Análise estática (PMD)
        working-directory: backend
        run: mvn pmd:check -B --no-transfer-progress

      - name: Upload relatório PMD
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: pmd-report
          path: backend/target/pmd.xml
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Build + Lint (Frontend)
  # ─────────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend – Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build de produção
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8080
        run: npm run build

      - name: Upload artefato de build
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 3

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Build Docker + Scan de vulnerabilidades (Trivy)
  # Depende do backend e frontend para garantir que ambos passaram
  # ─────────────────────────────────────────────────────────────────────────────
  docker:
    name: Docker – Build & Scan
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build imagem backend
        run: docker build -t asset-management-api:ci ./backend

      - name: Build imagem frontend
        run: |
          docker build \
            --build-arg VITE_API_URL=http://localhost:8080 \
            -t asset-management-frontend:ci \
            ./frontend

      - name: Scan backend com Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: asset-management-api:ci
          format: table
          exit-code: "0"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Scan frontend com Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: asset-management-frontend:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Upload resultado Trivy (SARIF)
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif
