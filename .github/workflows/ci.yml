name: CI – Build, Test e Qualidade

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:

  toolchain-policy:
    name: Toolchain - Politica de Runtime
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validar politica de runtime/toolchain
        run: node scripts/validate-toolchain.mjs

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Build + Testes + Cobertura (Backend)
  # ─────────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend – Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Build e testes (com JaCoCo)
        working-directory: backend
        run: mvn clean verify -B --no-transfer-progress

      - name: Upload relatório JaCoCo
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/
          retention-days: 7

      - name: Upload resultados Allure
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 7

      - name: Publicar cobertura no Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/target/site/jacoco/jacoco.xml
          flags: backend
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Qualidade de Código (Backend) – executa em paralelo com o Job 1
  # ─────────────────────────────────────────────────────────────────────────────
  backend-quality:
    name: Backend – Qualidade (Spotless + PMD)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Verificar formatação (Spotless)
        working-directory: backend
        run: mvn spotless:check -B --no-transfer-progress

      - name: Análise estática (PMD)
        working-directory: backend
        run: mvn pmd:check -B --no-transfer-progress

      - name: Upload relatório PMD
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pmd-report
          path: backend/target/pmd.xml
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Build + Lint (Frontend)
  # ─────────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend – Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build de produção
        working-directory: frontend
        env:
          VITE_API_URL: /api
        run: npm run build

      - name: Upload artefato de build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 3

  sprint-reporter:
    name: Sprint Reporter - Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sprint-reporter/package-lock.json

      - name: Instalar dependencias
        working-directory: sprint-reporter
        run: npm ci

      - name: Lint
        working-directory: sprint-reporter
        run: npm run lint

      - name: Build
        working-directory: sprint-reporter
        run: npm run build

  api-contract:
    name: API Contract - OpenAPI e Postman
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: asset_management
          POSTGRES_USER: asset_user
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_URL: jdbc:postgresql://localhost:5432/asset_management
      DB_USERNAME: asset_user
      DB_PASSWORD: ci_password
      JWT_SECRET: ci-test-jwt-secret-must-be-at-least-64-characters-long-padding-here
      MAIL_HOST: localhost
      MAIL_PORT: "1025"
      MAIL_USERNAME: ci@test.com
      MAIL_PASSWORD: ci-password
      MAIL_FROM: ci@test.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Configurar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sincronizar contrato API
        run: bash scripts/sync-api-contract.sh

      - name: Validar sem drift de contrato
        run: git diff --exit-code -- openapi/openapi.yaml postman/collection.json

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Testes E2E Frontend (Playwright via Docker Compose)
  # Executa a suite e2e com reset de massa e publica artefatos de relatorio
  # ─────────────────────────────────────────────────────────────────────────────
  playwright-e2e:
    name: Frontend E2E – Playwright (Docker)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Criar .env para testes E2E
        run: cp .env.example .env

      - name: Executar suite E2E Playwright
        run: |
          docker compose up -d postgres asset-management frontend allure allure-ui
          docker compose up --abort-on-container-exit --exit-code-from clean-allure-results clean-allure-results
          docker compose up --abort-on-container-exit --exit-code-from reset-e2e-data reset-e2e-data
          docker compose up --abort-on-container-exit --exit-code-from test-playwright test-playwright

      - name: Upload resultados Allure (E2E)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-e2e
          path: allure-results/
          retention-days: 7

      - name: Upload relatórios Playwright
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-reports
          path: frontend/src/automation/playwright/reports/
          retention-days: 7

      - name: Encerrar stack de testes E2E
        if: always()
        run: docker compose down -v

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 6: Build Docker + Scan de vulnerabilidades (Trivy)
  # Depende do backend, frontend e ai-intelligence para garantir que todos passaram
  # ─────────────────────────────────────────────────────────────────────────────
  docker:
    name: Docker – Build & Scan
    runs-on: ubuntu-latest
    needs: [toolchain-policy, backend, frontend, sprint-reporter, api-contract, playwright-e2e]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build imagem backend
        run: docker build -t asset-management-api:ci ./backend

      - name: Build imagem frontend
        run: |
          docker build \
            --build-arg VITE_API_URL=/api \
            -t asset-management-frontend:ci \
            ./frontend

      - name: Scan backend com Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: asset-management-api:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Scan frontend com Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: asset-management-frontend:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Upload resultado Trivy (SARIF)
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif
