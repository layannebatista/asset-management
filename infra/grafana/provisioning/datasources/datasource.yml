apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      httpMethod: POST
      timeInterval: "15s"
      exemplarTraceIdDestinations: []

  # InfluxDB — métricas de performance do k6
  # Para enviar dados: k6 run --out influxdb=http://localhost:8086/k6 k6/test.js
  - name: InfluxDB (k6)
    uid: influxdb-k6
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: false
    editable: false
    jsonData:
      version: InfluxQL
      dbName: k6
      httpMode: POST
