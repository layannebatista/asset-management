openapi: 3.0.3

info:
  title: Enterprise Asset Management API
  version: 1.0.0
  description: >
    Enterprise-grade multi-tenant asset lifecycle management API.
    Designed for backend architecture and automation practice.

servers:
  - url: http://localhost:8080
    description: Local Development

security:
  - bearerAuth: []

tags:
  - name: Assets
  - name: Asset History
  - name: Categories
  - name: Inventory
  - name: Maintenance
  - name: Organizations
  - name: Transfers
  - name: Units
  - name: Users
  - name: User Activation
  - name: Audit
  - name: Dashboard

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    ############################################
    # COMMON
    ############################################

    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string

    PageResponseAsset:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/AssetResponse'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer

    ############################################
    # ENUMS
    ############################################

    AssetStatus:
      type: string
      enum: [ACTIVE, RETIRED, IN_MAINTENANCE]

    AssetType:
      type: string
      enum: [EQUIPMENT, VEHICLE, FURNITURE, IT]

    UserRole:
      type: string
      enum: [ADMIN, MANAGER, OPERATOR]

    ############################################
    # ASSET
    ############################################

    AssetCreateRequest:
      type: object
      required: [type, model, unitId]
      properties:
        assetTag:
          type: string
        type:
          $ref: '#/components/schemas/AssetType'
        model:
          type: string
        unitId:
          type: integer

    AssetResponse:
      type: object
      properties:
        id:
          type: integer
        assetTag:
          type: string
        type:
          $ref: '#/components/schemas/AssetType'
        model:
          type: string
        status:
          $ref: '#/components/schemas/AssetStatus'
        organizationId:
          type: integer
        unitId:
          type: integer
        assignedUserId:
          type: integer
          nullable: true

    ############################################
    # CATEGORY
    ############################################

    CategoryRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string

    CategoryResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        active:
          type: boolean

    ############################################
    # INVENTORY
    ############################################

    InventoryResponse:
      type: object
      properties:
        id:
          type: integer
        status:
          type: string
        unitId:
          type: integer
        startedAt:
          type: string
          format: date-time
        closedAt:
          type: string
          format: date-time
          nullable: true

    ############################################
    # TRANSFER
    ############################################

    TransferCreateRequest:
      type: object
      required: [assetId, toUnitId]
      properties:
        assetId:
          type: integer
        toUnitId:
          type: integer
        reason:
          type: string

    TransferResponse:
      type: object
      properties:
        id:
          type: integer
        assetId:
          type: integer
        fromUnitId:
          type: integer
        toUnitId:
          type: integer
        status:
          type: string
        requestedAt:
          type: string
          format: date-time

    ############################################
    # USER
    ############################################

    UserResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        active:
          type: boolean

    ############################################
    # ORGANIZATION
    ############################################

    OrganizationResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        status:
          type: string

    ############################################
    # UNIT
    ############################################

    UnitResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        status:
          type: string
        mainUnit:
          type: boolean

    ############################################
    # DASHBOARD
    ############################################

    ExecutiveDashboard:
      type: object
      properties:
        totalAssets:
          type: integer
        activeAssets:
          type: integer
        maintenanceAssets:
          type: integer
        retiredAssets:
          type: integer

paths:

  ############################################
  # ASSETS
  ############################################

  /assets:
    get:
      tags: [Assets]
      summary: Listar ativos (com filtros e paginação)
      responses:
        200:
          description: Lista paginada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponseAsset'

  /assets/{id}:
    get:
      tags: [Assets]
      summary: Buscar ativo por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Ativo encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetResponse'
        404:
          description: Não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  ############################################
  # CATEGORIES
  ############################################

  /categories:
    post:
      tags: [Categories]
      summary: Criar categoria
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryRequest'
      responses:
        201:
          description: Criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'

    get:
      tags: [Categories]
      summary: Listar categorias
      responses:
        200:
          description: Lista
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryResponse'

  ############################################
  # DASHBOARD
  ############################################

  /api/dashboard/executive:
    get:
      tags: [Dashboard]
      summary: Dashboard executivo (ADMIN)
      responses:
        200:
          description: Dados consolidados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutiveDashboard'
        403:
          description: Acesso negado