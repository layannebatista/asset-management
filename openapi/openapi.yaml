openapi: 3.0.3

info:
  title: Enterprise Asset Management API
  version: 1.0.0
  description: >
    Enterprise-grade multi-tenant asset lifecycle management API.
    Designed for backend architecture and automation practice.

servers:
  - url: http://localhost:8080
    description: Local Development

security:
  - bearerAuth: []

tags:
  - name: Assets
  - name: Asset History
  - name: Categories
  - name: Inventory
  - name: Maintenance
  - name: Organizations
  - name: Transfers
  - name: Units
  - name: Users
  - name: User Activation
  - name: Audit
  - name: Dashboard

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    ############################################
    # COMMON
    ############################################

    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string

    PageResponseAsset:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/AssetResponse'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer

    ############################################
    # ENUMS
    ############################################

    AssetStatus:
      type: string
      enum: [AVAILABLE, ASSIGNED, IN_TRANSFER, IN_MAINTENANCE, UNAVAILABLE, RETIRED]

    AssetType:
      type: string
      enum: [MOBILE_PHONE, NOTEBOOK, TABLET, DESKTOP, VEHICLE, OTHER]

    UserRole:
      type: string
      enum: [ADMIN, GESTOR, OPERADOR]

    ############################################
    # ASSET
    ############################################

    AssetCreateRequest:
      type: object
      required: [type, model, unitId]
      properties:
        assetTag:
          type: string
        type:
          $ref: '#/components/schemas/AssetType'
        model:
          type: string
        unitId:
          type: integer

    AssetResponse:
      type: object
      properties:
        id:
          type: integer
        assetTag:
          type: string
        type:
          $ref: '#/components/schemas/AssetType'
        model:
          type: string
        status:
          $ref: '#/components/schemas/AssetStatus'
        organizationId:
          type: integer
        unitId:
          type: integer
        assignedUserId:
          type: integer
          nullable: true

    ############################################
    # CATEGORY
    ############################################

    CategoryRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string

    CategoryResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        active:
          type: boolean

    ############################################
    # INVENTORY
    ############################################

    InventoryResponse:
      type: object
      properties:
        id:
          type: integer
        status:
          type: string
        unitId:
          type: integer
        startedAt:
          type: string
          format: date-time
        closedAt:
          type: string
          format: date-time
          nullable: true

    ############################################
    # TRANSFER
    ############################################

    TransferCreateRequest:
      type: object
      required: [assetId, toUnitId]
      properties:
        assetId:
          type: integer
        toUnitId:
          type: integer
        reason:
          type: string

    TransferResponse:
      type: object
      properties:
        id:
          type: integer
        assetId:
          type: integer
        fromUnitId:
          type: integer
        toUnitId:
          type: integer
        status:
          type: string
        requestedAt:
          type: string
          format: date-time

    ############################################
    # USER
    ############################################

    UserResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        active:
          type: boolean

    ############################################
    # ORGANIZATION
    ############################################

    OrganizationResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        status:
          type: string

    ############################################
    # UNIT
    ############################################

    UnitResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        status:
          type: string
        mainUnit:
          type: boolean

    ############################################
    # DASHBOARD
    ############################################

    AssetIdleItem:
      type: object
      properties:
        assetTag:
          type: string
        model:
          type: string
        type:
          $ref: '#/components/schemas/AssetType'
        idleDays:
          type: integer
          format: int64

    ExecutiveDashboard:
      type: object
      properties:
        # Basic metrics
        totalAssets:
          type: integer
          format: int64
        totalMaintenance:
          type: integer
          format: int64
        totalUsers:
          type: integer
          format: int64
        # Asset distribution
        assetsByStatus:
          type: object
          additionalProperties:
            type: integer
            format: int64
        assetsByUnit:
          type: object
          additionalProperties:
            type: integer
            format: int64
        assetsByType:
          type: object
          additionalProperties:
            type: integer
            format: int64
        # Maintenance metrics
        maintenanceByStatus:
          type: object
          additionalProperties:
            type: integer
            format: int64
        maintenanceByMonth:
          type: object
          additionalProperties:
            type: integer
            format: int64
        # Transfer metrics
        transferByStatus:
          type: object
          additionalProperties:
            type: integer
            format: int64
        transferByMonth:
          type: object
          additionalProperties:
            type: integer
            format: int64
        # User metrics
        usersByStatus:
          type: object
          additionalProperties:
            type: integer
            format: int64
        usersByRole:
          type: object
          additionalProperties:
            type: integer
            format: int64
        # Operational fields
        assetsAvailable:
          type: integer
          format: int64
        assetsRetiredThisMonth:
          type: integer
          format: int64
        assetsIdleCount:
          type: integer
          format: int64
        pendingTransfersCount:
          type: integer
          format: int64
        maintenanceCostMonth:
          type: number
        insuranceExpiringCount:
          type: integer
          format: int64

    UnitDashboard:
      type: object
      properties:
        # Basic metrics
        totalAssets:
          type: integer
          format: int64
        totalMaintenance:
          type: integer
          format: int64
        totalUsers:
          type: integer
          format: int64
        # Distributions
        assetsByStatus:
          type: object
          additionalProperties:
            type: integer
            format: int64
        maintenanceByStatus:
          type: object
          additionalProperties:
            type: integer
            format: int64
        # Operational fields
        assetsAvailable:
          type: integer
          format: int64
        utilizationRate:
          type: number
        pendingTransfersCount:
          type: integer
          format: int64
        maintenanceCostMonth:
          type: number
        assetsIdleList:
          type: array
          items:
            $ref: '#/components/schemas/AssetIdleItem'

    PersonalAsset:
      type: object
      properties:
        assetTag:
          type: string
        model:
          type: string
        type:
          $ref: '#/components/schemas/AssetType'
        status:
          $ref: '#/components/schemas/AssetStatus'
        assignedSince:
          type: string
          format: date-time
          nullable: true
        maintenanceCode:
          type: string
          nullable: true

    PersonalMaintenance:
      type: object
      properties:
        code:
          type: string
        assetTag:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time

    PersonalDashboard:
      type: object
      properties:
        totalAssetsAssigned:
          type: integer
          format: int64
        totalMaintenanceRelated:
          type: integer
          format: int64
        myAssets:
          type: array
          items:
            $ref: '#/components/schemas/PersonalAsset'
        myPendingTransfers:
          type: integer
          format: int64
        myOpenMaintenances:
          type: array
          items:
            $ref: '#/components/schemas/PersonalMaintenance'

paths:

  ############################################
  # ASSETS
  ############################################

  /assets:
    get:
      tags: [Assets]
      summary: Listar ativos (com filtros e paginação)
      responses:
        200:
          description: Lista paginada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponseAsset'

  /assets/{id}:
    get:
      tags: [Assets]
      summary: Buscar ativo por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Ativo encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetResponse'
        404:
          description: Não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  ############################################
  # CATEGORIES
  ############################################

  /categories:
    post:
      tags: [Categories]
      summary: Criar categoria
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryRequest'
      responses:
        201:
          description: Criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'

    get:
      tags: [Categories]
      summary: Listar categorias
      responses:
        200:
          description: Lista
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryResponse'

  ############################################
  # DASHBOARD
  ############################################

  /api/dashboard/executive:
    get:
      tags: [Dashboard]
      summary: Dashboard executivo (ADMIN)
      responses:
        200:
          description: Dados consolidados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutiveDashboard'
        403:
          description: Acesso negado

  /api/dashboard/unit:
    get:
      tags: [Dashboard]
      summary: Dashboard operacional (GESTOR)
      responses:
        200:
          description: Dados da unidade
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnitDashboard'
        403:
          description: Acesso negado

  /api/dashboard/personal:
    get:
      tags: [Dashboard]
      summary: Dashboard pessoal (OPERADOR)
      responses:
        200:
          description: Dados do usuário
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonalDashboard'
        401:
          description: Não autenticado