openapi: 3.0.3
info:
  title: Enterprise Asset Management API
  version: 1.0.0

servers:
  - url: http://localhost:8080

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []

paths:

  /auth/login:
    post:
      summary: Authenticate user

  /assets:
    get:
      summary: List assets
    post:
      summary: Create asset

  /users:
    get:
      summary: List users
    post:
      summary: Create user

  /organizations:
    get:
      summary: List organizations
    post:
      summary: Create organization