server:
  port: 8080

spring:

  application:
    name: asset-management

  datasource:
    url: jdbc:postgresql://localhost:5433/asset_management
    username: asset_user
    password: asset123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

security:
  jwt:
    secret: very-secret-key-change-in-production-123456789
    expiration: 86400000

security:
  jwt:
    secret: 12345678901234567890123456789012345678901234567890
    expiration: 86400000
