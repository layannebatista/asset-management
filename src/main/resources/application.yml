server:
  port: 8080

spring:

  application:
    name: asset-management

  datasource:
    url: jdbc:postgresql://localhost:5433/asset_management
    username: asset_user
    password: asset123
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: false

    hibernate:
      ddl-auto: validate

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    baseline-version: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info

security:
  jwt:
    secret: 12345678901234567890123456789012345678901234567890
    expiration: 86400000

logging:
  level:
    org.hibernate.SQL: off
    org.hibernate.type.descriptor.sql.BasicBinder: off
