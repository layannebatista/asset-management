# =============================================================================
# Configuração do JUnit Platform para Cucumber + Allure
# =============================================================================

# ─── Cucumber ─────────────────────────────────────────────────────────────────

# Nomenclatura longa: exibe "Feature: Cenário" nos relatórios em vez de IDs
cucumber.junit-platform.naming-strategy=long

# Plugins ativos:
#   pretty          → saída legível no console
#   html:target/... → relatório HTML nativo do Cucumber
#   AllureCucumber7 → integração com Allure (gera arquivos em allure-results/)
cucumber.plugin=pretty,html:target/cucumber-reports/cucumber.html,io.qameta.allure.cucumber7jvm.AllureCucumber7Jvm


# Localização das classes de step definitions e configuração Spring
cucumber.glue=com.portfolio.assetmanagement

# Não publica resultados no Cucumber cloud
cucumber.publish.enabled=false
