# Perfil ativo no Docker Compose (SPRING_PROFILES_ACTIVE=docker).
# Complementa application.yml – apenas sobreposições específicas para container.

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/asset_management?currentSchema=public}
    username: ${DB_USERNAME:asset_user}
    password: ${DB_PASSWORD:asset123}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Pool menor no Docker para não sobrecarregar a instância única do PG
      maximum-pool-size: 15
      minimum-idle: 3

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate.format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    baseline-on-migrate: false
    default-schema: public

# ─── Actuator em produção: detalhes apenas para requisições autenticadas ──────
management:
  health:
    mail:
      enabled: false   # SMTP não disponível no Docker; evita que AuthenticationFailed derrube o healthcheck
  endpoint:
    health:
      show-details: when-authorized

# ─── AI Intelligence Service (Docker) ────────────────────────────────────────
ai:
  service:
    url: ${AI_SERVICE_URL:http://ai-intelligence:3100}
    api-key: ${AI_SERVICE_API_KEY:}

# ─── Swagger desabilitado em Docker (segurança) ──────────────────────────────────
# Para ativar apenas em desenvolvimento, use application-dev.yml
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# ─── Logging estruturado para produção ────────────────────────────────────────
logging:
  level:
    root: WARN
    com.portfolio.assetmanagement: INFO
    org.flywaydb: INFO
  pattern:
    # Formato linha única facilita coleta pelo Prometheus/Loki/ELK
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSZ} %-5level [%thread] %logger{40} : %msg%n"
