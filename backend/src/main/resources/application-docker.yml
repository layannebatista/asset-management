spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/asset_management}
    username: ${DB_USERNAME:asset_user}
    password: ${DB_PASSWORD:asset123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true