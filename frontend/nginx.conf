server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker DNS resolver — necessário para proxy_pass com nomes de serviço Docker
    resolver 127.0.0.11 valid=5s;

    # ─── Proxy reverso para o backend ────────────────────────────────────────
    # Todas as chamadas de API feitas pelo frontend (baseURL=/api) são encaminhadas
    # para o container do backend sem que o browser faça requisições cross-origin.
    # Funciona tanto no Docker (asset-management:8080) quanto via localhost:5173.
    #
    # NOTA: proxy_pass com variável ($backend) desabilita a substituição de URI no
    # Nginx — o prefixo /api/ NÃO seria removido automaticamente. Por isso usamos
    # rewrite para remover /api/ explicitamente antes de repassar ao backend.
    set $backend "http://asset-management:8080";
    location /api/ {
        rewrite            ^/api/(.*)$ /$1 break;
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ─── Compressão ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ─── Cache de assets estáticos (Vite usa hash no nome do arquivo) ────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ─── React Router – todas as rotas servem index.html ─────────────────────
    location / {
        try_files $uri /index.html;
    }

    # ─── Cabeçalhos de segurança ──────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options   "nosniff"                       always;
    add_header X-XSS-Protection         "1; mode=block"                 always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), microphone=()" always;
}
